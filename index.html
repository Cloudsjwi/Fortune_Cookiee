<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Fortune Cookie</title>

    <style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    font-family:'Comic Sans MS', cursive;
    text-align:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:url("https://i.pinimg.com/1200x/ec/91/eb/ec91ebf700c3044175ba92f0b9f3fb74.jpg");
    background-size:cover;
    background-position:center;

    filter:blur(5px);
    transform:scale(1.05);

    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;

    background:rgba(255,255,255,0.2);

    z-index:-1;
}

button:hover{
    transform:scale(1.05);
}

#pesan{
    margin-top:25px;

    max-width:90px;
   
    padding:20px;

    background:rgba(255,248,240,0.35);

    backdrop-filter:blur(10px);

    border-radius:20px;

    color:#6b4f3a;

    font-size:18px;

    display:none;
}

h1{
    color:#6b4f3a;
    font-size:50px;
}

@media (max-width: 768px){

    h1{
        font-size:40px;
    }

    p{
        font-size:16px;
    }

    button{
        font-size:16px;
        padding:15px 25px;
    }

    #pesan{
        width:80%;
        font-size:16px;
    }

    .cookie-title{
        width:45px;
        margin-right:8px;
    }

}

button{
    border:1px solid rgba(255,255,255,0.4);

    padding:15px 30px;
    border-radius:999px;
    cursor:pointer;

    background:rgba(255,248,240,0.35);

    backdrop-filter:blur(10px);

    color:#6b4f3a;
    font-size:18px;

    box-shadow:
        0 8px 20px rgba(107,79,58,0.15);

    transition:0.3s;
}
 
.show{
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

.love{
    position:fixed;
    pointer-events:none;
    z-index:1;

    opacity:0.6;
    filter:blur(0.5px);

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:
        rotate(var(--rot))
        translateY(0);
    }

    50%{
        transform:
        rotate(var(--rot))
        translateY(-15px);
    }

}

</style>

</head>

<body>

    <div id="love-container"></div>

    <h1>
    <img src="Fortune_Cookie.png" class="cookie-title">
    Fortune Cookie
    </h1>

    

    <p>Klik cookie untuk menerima pesan rahasia</p>

    <button id="cookieBtn">
    🥠 Reveal Message
    </button>

    <div id="pesan"></div>

<script>

const daftarPesan = [

"✨ Kamu hebat hari ini.",
"🌷 Jangan lupa istirahat sebentar.",
"🍦 Es krim virtual telah dikirim.",
"🐸 Status hari ini: Kodok Premium.",
"💖 Ada hal baik yang menunggumu.",
"☕ Jangan lupa minum yang hangat.",
"📮 Seseorang mungkin sedang memikirkanmu."

];

const tombol = document.getElementById("cookieBtn");
const pesan = document.getElementById("pesan");
const loveContainer = document.getElementById("love-container");

function createLove() {

    const love = document.createElement("img");

    love.src = "love.png";
    love.classList.add("love");

    // posisi random
    love.style.left = Math.random() * 100 + "vw";
    love.style.top = Math.random() * 100 + "vh";

    // ukuran random
    const size = 20 + Math.random() * 80;
    love.style.width = size + "px";

    // rotasi random
    const rotate = Math.random() * 360;
    love.style.setProperty("--rot", rotate + "deg");

    // opacity random
    love.style.opacity = 0.3 + Math.random() * 0.7;

    // kecepatan animasi random
    love.style.animationDuration =
        (2 + Math.random() * 6) + "s";

    loveContainer.appendChild(love);

    // hilang setelah 5 detik
    setTimeout(() => {
        love.remove();
    }, 5000);
}

tombol.addEventListener("click", () => {

    const random =
    daftarPesan[
        Math.floor(
            Math.random() * daftarPesan.length
        )
    ];

    pesan.style.display = "block";

    pesan.classList.remove("show");
    void pesan.offsetWidth;
    pesan.classList.add("show");

    pesan.innerHTML =
        "<b>❤︎♡ Pesan untukmu hari ini</b><br><br>" +
        random;

    tombol.innerHTML =
        "🥠 Open Another Fortune";

    // bersihin love lama
    loveContainer.innerHTML = "";

    // munculin love satu-satu
    for(let i = 0; i < 20; i++){

        setTimeout(() => {
            createLove();
        }, i * 80);

    }

});

</script>
</body>
</html>
