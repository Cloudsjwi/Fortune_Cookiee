<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fortune Cookie</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
<style>
body{
    margin:0;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    font-family:'Quicksand', sans-serif;
    text-align:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:url("https://i.pinimg.com/1200x/ec/91/eb/ec91ebf700c3044175ba92f0b9f3fb74.jpg");
    background-size:cover;
    background-position:center;

    filter:blur(5px);
    transform:scale(1.05);

    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;

    background:rgba(255,255,255,0.2);

    z-index:-1;
}

button:hover{
    transform:scale(1.05);
}

#pesan{
    margin-top:25px;
    max-width:500px;
    width:90%;
    padding:20px;

    background:rgba(255,248,240,0.35);
    backdrop-filter:blur(10px);

    border-radius:20px;

    color:#6b4f3a;
    font-size:18px;

    display:none;
}

h1{
    color:#6b4f3a;
    font-size:50px;
}

.cookie-title{
    width:70px;
    height:auto;
    vertical-align:middle;
    margin-right:8px;
}

@media (max-width:768px){

    h1{
        font-size:32px;
    }

    p{
        font-size:16px;
        padding:0 20px;
    }

    button{
        font-size:16px;
        padding:12px 20px;
    }

    #pesan{
        width:85%;
        font-size:16px;
    }

    .cookie-title{
        width:45px;
        margin-right:6px;
    }

}

button{
    border:1px solid rgba(255,255,255,0.4);

    padding:15px 30px;
    border-radius:999px;
    cursor:pointer;

    background:rgba(255,248,240,0.35);

    backdrop-filter:blur(10px);

    color:#6b4f3a;
    font-size:18px;

    box-shadow:
        0 8px 20px rgba(107,79,58,0.15);

    transition:0.3s;
}
 
.show{
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

.love{
    position:fixed;
    pointer-events:none;
    animation: float 4s ease-in-out infinite;
    z-index: 1;
    opacity: 0.6;
    filter: blur(0.5px);
}

.left{
    left:10%;
    top:25%;
}

.right{
    right:10%;
    top:65%;
}

@keyframes float{
    0%,100%{
        transform:
        rotate(var(--rot))
        translateY(0);
    }

    50%{
        transform:
        rotate(var(--rot))
        translateY(-15px);
    }
}

</style>

</head>

<body>

    <div id="love-container"></div>

    <h1>
    <img src="Fortune_Cookie.png" class="cookie-title">
    Fortune Cookie
    </h1>

    <p>Klik cookie untuk menerima pesan rahasia</p>

    <button id="cookieBtn">
    -`♡´- Reveal Message
    </button>

    <div id="pesan"></div>

    <script>

const daftarPesan = [

"✨ Kamu hebat hari ini.",

"🌷 Jangan lupa istirahat sebentar.",

"🍦 Es krim virtual telah dikirim.",

"📱 Coba cek notifikasi. Siapa tahu... ya nggak tahu juga sih.",

"💖 Ada hal baik yang menunggumu.",

"☕ Jangan lupa minum yang hangat.",

"📮 Seseorang mungkin sedang memikirkanmu.",

"✨ Hari ini kamu lebih keren dari yang kamu kira.",

"🌷 Versi dirimu yang dulu pasti bangga melihatmu sekarang.",

"☕ Minum air dulu, dunia bisa menunggu sebentar.",

"🍀 Keberuntungan sedang mencari alamatmu.",

"🐸 Kodok bijak berkata: rebahan juga butuh bakat.",

"🍜 Mie instan mungkin bukan solusi, tapi lumayan membantu.",

"💌 Ada seseorang yang senang saat melihat namamu muncul.",

"🌙 Jangan begadang... kata fortune cookie yang diketik jam 2 pagi.",

"🦦 Kamu berhak mendapat camilan hari ini.",

"✨ Plot twist yang bagus sedang dalam perjalanan.",

"🍓 Besok mungkin biasa saja, tapi mungkin juga luar biasa.",

"🐱 Seekor kucing imajiner mengirimimu keberuntungan.",

"🧸 Kamu layak diperlakukan dengan lembut, termasuk oleh dirimu sendiri.",

"🍦 Es krim virtual tambahan berhasil dikirim.",

"📮 Semesta menitip pesan: pelan-pelan juga tetap maju.",

"🌻 Jangan bandingkan bab 2 hidupmu dengan bab 20 orang lain.",

"🐸 Status hari ini diperbarui menjadi: Kodok Deluxe Edition.",

"💖 Ada hal baik yang sedang diam-diam mendekat.",

"🫧 Tidak semua hari harus produktif untuk tetap berharga.",

"👀 Aku tahu rahasiamu... eh nggak jadi deng.",

"📱 Coba cek notifikasi. Siapa tahu... ya nggak tahu juga sih.",

"🐸 Kamu membaca pesan ini dengan sangat serius ya.",

"🍪 Fortune cookie ini bangga karena berhasil membuatmu klik.",

"🤨 Jangan lihat belakangmu. Serius, jangan.",

"✨ Semesta punya pesan penting untukmu... loading...",

"🦝 Ada kemungkinan kamu sedang menunda sesuatu.",

"📮 Seseorang memikirkanmu. Atau mungkin cuma lapar.",

"👁️ Fortune cookie ini sedang menilai pilihan hidupmu.",

"🚨 Tingkat overthinking terdeteksi meningkat.",

"🫵 Iya kamu. Yang lagi baca ini.",

"😌 Tenang, aku nggak akan membocorkan draft-chat yang belum kamu kirim.",

"📸 Bayangkan kalau fortune cookie bisa screenshot.",

"🐱 Kucing tetangga tahu sesuatu yang kamu tidak tahu.",

"💌 Ada yang suka kamu. Atau suka pinjam pulpenmu.",

"🕵️ Aku tahu siapa crush-mu... tapi aku profesional.",

"😗 Kamu berharap dapat pesan spesial ya?",

"📡 Semesta mengirim sinyal. Kamu malah buka TikTok.",

"🚪 Kesempatan sedang mengetuk pintu. Coba pastikan bukan kurir dulu.",

"🎭 Kamu terlihat produktif. Terlihat.",

"🎁 Kamu akan menemukan sesuatu yang membuatmu tersenyum minggu ini."

];

const tombol = document.getElementById("cookieBtn");
const pesan = document.getElementById("pesan");

tombol.addEventListener("click", () => {

    const random =
    daftarPesan[Math.floor(Math.random() * daftarPesan.length)];

    pesan.style.display = "block";
    pesan.classList.remove("show");
    void pesan.offsetWidth;
    pesan.classList.add("show");
    pesan.innerHTML =
    "<b> ❤︎♡ Pesan untukmu hari ini</b><br><br>" + random;
    tombol.innerHTML = "🥠 Open Another Fortune";

loveContainer.innerHTML = "";

const jumlahLove =
window.innerWidth < 768 ? 15 : 25;

for(let i = 0; i < jumlahLove; i++){
    setTimeout(() => {
        createLove();
    }, i * 80);


}
    

});

const loveContainer = document.getElementById("love-container");

function createLove() {
    const love = document.createElement("img");
    love.src = "love.png";
    love.classList.add("love");

    // posisi random lebih “liar”
    love.style.left = Math.random() * 100 + "vw";
    love.style.top = Math.random() * 100 + "vh";

    // size random lebih variatif
    const size = 15 + Math.random() * 60;
    love.style.width = size + "px";

    // rotasi random (lebih ekstrem)
    const rotate = Math.random() * 360;

     love.style.setProperty(
      "--rot",
     rotate + "deg"
    );

    // opacity random biar ada depth
    love.style.opacity = 0.3 + Math.random() * 0.7;

    // speed animasi random
    love.style.animationDuration = (2 + Math.random() * 6) + "s";

    loveContainer.appendChild(love);
}



</script>
</body>
</html>
